name: Validate Linear ticket

on:
  pull_request_target:
    types: [edited, opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    environment: Github Actions
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      PR_TITLE: ${{ github.event.pull_request.title }}

    steps:
      - id: linear-ticket
        name: Validate the Linear ticket in the pull request title
        run: |
          set -euo pipefail

          if [[ ! "$PR_TITLE" =~ ^(KIN-[0-9]+):[[:space:]]+.+$ ]]; then
            echo "Pull request titles must match KIN-123: description."
            exit 1
          fi

          ticket_identifier="${BASH_REMATCH[1]}"
          request_body=$(jq -n --arg identifier "$ticket_identifier" '{
            query: "query Issue($identifier: String!) { issue(id: $identifier) { identifier title } }",
            variables: {identifier: $identifier}
          }')
          response=$(curl --fail-with-body --silent --show-error \
            --header "Authorization: $LINEAR_API_KEY" \
            --header "Content-Type: application/json" \
            --data "$request_body" \
            https://api.linear.app/graphql)

          if [ "$(jq '.errors | length' <<<"$response")" -gt 0 ]; then
            jq -r '.errors[]?.message' <<<"$response" >&2
            exit 1
          fi

          linear_identifier=$(jq -r '.data.issue.identifier // empty' <<<"$response")
          linear_title=$(jq -r '.data.issue.title // empty' <<<"$response")
          if [ "$linear_identifier" != "$ticket_identifier" ]; then
            echo "Linear ticket $ticket_identifier was not found."
            exit 1
          fi

          echo "Validated $linear_identifier: $linear_title"
          printf 'ticket_identifier=%s\n' "$linear_identifier" >> "$GITHUB_OUTPUT"

      - name: Add the Linear ticket link to the pull request description
        uses: actions/github-script@v8
        env:
          TICKET_IDENTIFIER: ${{ steps.linear-ticket.outputs.ticket_identifier }}
        with:
          script: |
            const marker = "<!-- linear-ticket-link -->";
            const annotation = `${marker}\nLinear: ${process.env.TICKET_IDENTIFIER}\n${marker}`;
            const body = context.payload.pull_request.body ?? "";
            const pattern = /<!-- linear-ticket-link -->\nLinear: KIN-\d+\n<!-- linear-ticket-link -->\n*/;
            const updated = pattern.test(body)
              ? body.replace(pattern, `${annotation}\n`)
              : `${body.trimEnd()}\n\n${annotation}\n`;

            if (updated !== body) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: updated,
              });
            }
