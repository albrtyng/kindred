name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6

      - uses: actions/cache@v6
        with:
          path: ~/Library/Caches/kindred-tools
          key: kindred-tools-${{ runner.os }}-${{ hashFiles('scripts/swiftformat', 'scripts/swiftlint') }}
          restore-keys: |
            kindred-tools-${{ runner.os }}-

      - run: make lint
