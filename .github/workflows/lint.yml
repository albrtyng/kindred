name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - uses: gradle/actions/setup-gradle@v6

      - uses: actions/cache@v6
        with:
          path: ~/Library/Caches/kindred-tools
          key: kindred-tools-${{ runner.os }}-${{ hashFiles('scripts/swiftformat', 'scripts/swiftlint') }}
          restore-keys: |
            kindred-tools-${{ runner.os }}-

      - run: uv --directory backend sync --locked --all-groups

      - run: make lint

      - run: make python-typecheck
